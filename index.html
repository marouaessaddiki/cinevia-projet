<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinévia</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <h2 class="logo">🎬 Cinévia</h2>
  <nav>
    <a href="#Accueil">Accueil</a>
    <a href="#Films">Films</a>
    <a href="#Favoris">Favoris</a>
    <input type="text" placeholder="Rechercher...">
  </nav>
</header>

<section id="Accueil" class="hero">
  <div class="overlay">
    <h1>Découvrez les meilleurs films</h1>
    <p>Explorez, recherchez et ajoutez vos films préférés</p>
    <button>Explorer maintenant</button>
  </div>
</section>

<section class="filters">
  <button class="filter-btn" data-cat="Tous">Tous</button>
  <button class="filter-btn" data-cat="Action">Action</button>
  <button class="filter-btn" data-cat="Comedie">Comédie</button>
  <button class="filter-btn" data-cat="Drama">Drame</button>
</section>

<div id="app">

  <!-- FILMS -->
  <section id="Films" class="films">
    <h2>Films populaires</h2>
    <div class="grid" id="films-container"></div>
  </section>

  <!-- FAVORIS -->
  <section id="Favoris" class="favoris">
    <h2>❤️ Mes Favoris</h2>
    <div class="grid" id="favoris-container"></div>
  </section>

</div>

<footer>
  <p>© 2026 Cinévia</p>
</footer>

<script src="script.js"></script>
</body>
</html>
